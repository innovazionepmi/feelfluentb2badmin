<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Speech bubble icon -->
  <rect x="0" y="2" width="40" height="30" rx="8" fill="#DA2128"/>
  <polygon points="8,32 20,44 20,32" fill="#DA2128"/>
  <!-- FF letters inside bubble -->
  <text x="7" y="23" font-family="'Nunito', Arial, sans-serif" font-weight="800" font-size="17" fill="white" letter-spacing="-0.5">FF</text>
  <!-- Wordmark -->
  <text x="52" y="30" font-family="'Nunito', Arial, sans-serif" font-weight="800" font-size="22" fill="#1A1A1A" letter-spacing="-0.3">
    feel<tspan fill="#DA2128">fluent</tspan>
  </text>
  <!-- Tagline -->
  <text x="53" y="43" font-family="'Nunito', Arial, sans-serif" font-weight="600" font-size="9" fill="#6B7280" letter-spacing="0.5">B2B ADMIN</text>
</svg>
